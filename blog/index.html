<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Vaishnav Potlapalli</title>
  <meta name="description" content="Writing by Vaishnav Potlapalli on ML, vision, and engineering." />
  <meta property="og:title" content="Blog — Vaishnav Potlapalli" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #EFF3F8;
      --card: #FFFFFF;
      --fg: #2B3044;
      --fg-secondary: #6B7189;
      --fg-dim: #9498AB;
      --accent: #4E7EC2;
      --accent-soft: rgba(78,126,194,.10);
      --accent-hover: #3D6BAD;
      --border: #D8DDE8;
      --border-light: #E6EAF0;
      --serif: 'Newsreader', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --shadow-sm: 0 1px 3px rgba(43,48,68,.06);
      --shadow-md: 0 4px 16px rgba(43,48,68,.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      line-height: 1.65;
      font-size: 16px;
    }
    .nav {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: .85rem;
    }
    .nav a {
      color: var(--fg-dim);
      text-decoration: none;
      transition: color .2s;
    }
    .nav a:hover { color: var(--accent); }
    .nav .sep { color: var(--border); }
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }
    h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: .5rem;
    }
    .subtitle {
      font-size: .95rem;
      color: var(--fg-secondary);
      margin-bottom: 2.5rem;
    }
    .posts { display: flex; flex-direction: column; gap: .75rem; }
    .post-link { text-decoration: none; color: inherit; }
    .post-card {
      padding: 1.15rem 1.35rem;
      background: var(--card);
      border: 1px solid var(--border-light);
      border-radius: 11px;
      transition: all .2s ease;
      box-shadow: var(--shadow-sm);
    }
    .post-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .post-meta { margin-bottom: .3rem; }
    .post-meta time { font-size: .78rem; color: var(--fg-dim); }
    .post-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--fg);
    }
    .post-desc {
      font-size: .88rem;
      color: var(--fg-secondary);
      margin-top: .3rem;
      line-height: 1.55;
    }
    footer {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.8rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .8rem;
    }
    footer p { font-size: .8rem; color: var(--fg-dim); }
    footer a { font-size: .8rem; color: var(--accent); text-decoration: none; font-weight: 500; }
    footer a:hover { color: var(--accent-hover); }
    @media (max-width: 640px) {
      .page { padding: 0 1.25rem 4rem; }
      h1 { font-size: 1.8rem; }
      .nav { padding: 1.2rem 1.25rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/">Vaishnav Potlapalli</a>
    <span class="sep">/</span>
    <a href="/blog/">Blog</a>
  </nav>
  <div class="page">
    <h1>Blog</h1>
    <p class="subtitle">Writing about ML, vision, engineering, and whatever else I find interesting.</p>
    <div class="posts">

      <a class="post-link" href="/blog/hello-world/">
        <div class="post-card">
          <div class="post-meta">
            <time datetime="2026-03-02">March 2, 2026</time>
          </div>
          <h2 class="post-title">Hello World</h2>
          <p class="post-desc">A first post to test the blog.</p>
        </div>
      </a>
    </div>
  </div>
  <footer>
    <p><a href="/">← Home</a></p>
    <a href="mailto:vaishnav@vaishnavrao.com">say hello →</a>
  </footer>
</body>
</html>
